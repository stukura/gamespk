<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Typing Speed Challenge</title>
<style>
  :root {
    --bg: #0f1420;
    --panel: #161c2c;
    --muted: #8892a8;
    --text: #e6ecf5;
    --accent: #6ee7b7;
    --error: #f87171;
    --correct: #6ee7b7;
    --cursor: #fbbf24;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .container {
    max-width: 820px; margin: 0 auto; padding: 32px 20px;
  }
  header { text-align: center; margin-bottom: 24px; }
  h1 { font-size: 28px; margin: 0 0 4px; letter-spacing: -0.5px; }
  header p { color: var(--muted); margin: 0; font-size: 14px; }
  .challenge-banner {
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    padding: 14px 18px; border-radius: 10px; margin-bottom: 18px;
    font-size: 14px; text-align: center;
  }
  .panel {
    background: var(--panel); border-radius: 14px; padding: 28px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .controls {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 22px;
  }
  .controls label { color: var(--muted); font-size: 13px; align-self: center; }
  select, button {
    background: #222a3e; color: var(--text);
    border: 1px solid #2d374d; border-radius: 8px;
    padding: 10px 16px; font-size: 14px; font-family: inherit;
    cursor: pointer; transition: transform 0.1s, background 0.15s;
  }
  button.primary { background: var(--accent); color: #0f1420; border-color: var(--accent); font-weight: 600; }
  button:hover { background: #2d374d; }
  button.primary:hover { background: #34d399; }
  button:active { transform: scale(0.98); }
  .stats {
    display: flex; justify-content: space-around;
    margin-bottom: 20px; gap: 10px; flex-wrap: wrap;
  }
  .stat { text-align: center; min-width: 80px; }
  .stat .val { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .timer-pulse { animation: pulse 0.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .passage {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 20px; line-height: 1.8;
    padding: 22px; background: #0b1020; border-radius: 10px;
    min-height: 140px; word-wrap: break-word; user-select: none;
  }
  .passage span.correct { color: var(--correct); }
  .passage span.incorrect { color: var(--error); background: rgba(248,113,113,0.15); }
  .passage span.current {
    background: var(--cursor); color: #0f1420; border-radius: 2px;
  }
  .hidden-input {
    position: absolute; left: -9999px; opacity: 0;
  }
  .passage.focused { outline: 2px solid #2d374d; }
  .best { color: var(--muted); font-size: 13px; text-align: center; margin-top: 14px; }
  .result-card {
    animation: fadeIn 0.5s ease-out;
    text-align: center;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .result-wpm { font-size: 64px; font-weight: 800; color: var(--accent); margin: 8px 0; }
  .result-row { display: flex; justify-content: center; gap: 24px; margin: 16px 0; flex-wrap: wrap; }
  .share-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #0f1420; padding: 10px 18px;
    border-radius: 8px; font-weight: 600; font-size: 14px;
    opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }
  .hide { display: none !important; }
  @media (max-width: 480px) {
    .passage { font-size: 17px; padding: 16px; }
    .result-wpm { font-size: 48px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>⌨️ Typing Speed Challenge</h1>
    <p>60 seconds. How fast can you type?</p>
  </header>

  <div id="challenge-banner" class="challenge-banner hide"></div>

  <div class="panel">
    <!-- Start Screen -->
    <div id="start-screen">
      <div class="controls">
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
          <option value="easy">Easy — common words</option>
          <option value="medium" selected>Medium — sentences</option>
          <option value="hard">Hard — punctuation + long</option>
        </select>
        <button class="primary" id="start-btn">Start</button>
      </div>
      <div class="best" id="best-display"></div>
    </div>

    <!-- Play Screen -->
    <div id="play-screen" class="hide">
      <div class="stats">
        <div class="stat"><div class="val" id="timer">60</div><div class="lbl">Seconds</div></div>
        <div class="stat"><div class="val" id="live-wpm">0</div><div class="lbl">WPM</div></div>
        <div class="stat"><div class="val" id="live-acc">100%</div><div class="lbl">Accuracy</div></div>
      </div>
      <div class="passage" id="passage" tabindex="0"></div>
      <input type="text" class="hidden-input" id="typing-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <div class="controls" style="margin-top: 18px;">
        <button id="finish-btn">Finish early</button>
        <button id="restart-btn">Restart (Esc)</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hide result-card">
      <div class="lbl" style="color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-size: 12px;">Your Score</div>
      <div class="result-wpm" id="result-wpm">0</div>
      <div style="color: var(--muted); font-size: 14px;">Words Per Minute</div>
      <div class="result-row">
        <div class="stat"><div class="val" id="result-acc">0%</div><div class="lbl">Accuracy</div></div>
        <div class="stat"><div class="val" id="result-raw">0</div><div class="lbl">Raw WPM</div></div>
        <div class="stat"><div class="val" id="result-errors">0</div><div class="lbl">Errors</div></div>
        <div class="stat"><div class="val" id="result-chars">0</div><div class="lbl">Chars</div></div>
      </div>
      <div class="share-buttons">
        <button class="primary" id="copy-btn">Copy result</button>
        <button id="share-link-btn">Share link</button>
        <button id="again-btn">Play again</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const BANKS = {
  easy: "the and for you are not but all can has had was one our out day get how man new now old see two way who boy did its let put say she too use".split(" "),
  medium: [
    "the quick brown fox jumps over the lazy dog near the river bank",
    "learning to type quickly requires consistent practice and patience every single day",
    "a journey of a thousand miles begins with one single careful step forward",
    "reading books expands your mind and improves your writing skills significantly over time",
    "coffee in the morning helps many people start their day with clear focused energy",
    "the best way to predict the future is to create it with your own hands",
    "small daily improvements compound into remarkable long term results when practiced faithfully"
  ],
  hard: [
    "She asked, \"Can you believe it?\" — the crowd's reaction was quite unexpected; nevertheless, they persevered.",
    "Cryptographic algorithms (e.g., SHA-256, RSA-2048) safeguard communications against sophisticated adversaries.",
    "The philosopher's paradox: if consciousness emerges from complexity, then neural networks might—hypothetically—experience qualia.",
    "Approximately 73.2% of respondents affirmed: \"Yes, I'd recommend this to colleagues,\" per the Q3 2024 survey.",
    "\"Unbelievable!\" exclaimed Dr. Zhang; meanwhile, the laboratory's instruments registered anomalous quantum fluctuations."
  ]
};

function buildPassage(diff) {
  if (diff === "easy") {
    const words = [];
    for (let i = 0; i < 60; i++) words.push(BANKS.easy[Math.floor(Math.random() * BANKS.easy.length)]);
    return words.join(" ");
  }
  const pool = BANKS[diff];
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  let text = shuffled.join(" ");
  while (text.length < 300) text += " " + pool[Math.floor(Math.random() * pool.length)];
  return text;
}

const $ = id => document.getElementById(id);
const state = {
  passage: "", pos: 0, errors: 0, totalKeys: 0, correctKeys: 0,
  startTime: null, timer: null, elapsed: 0, duration: 60,
  difficulty: "medium", running: false
};

function render() {
  const p = $("passage");
  p.innerHTML = "";
  for (let i = 0; i < state.passage.length; i++) {
    const span = document.createElement("span");
    span.textContent = state.passage[i];
    if (i < state.pos) {
      span.className = state.typed && state.typed[i] === state.passage[i] ? "correct" : "incorrect";
    } else if (i === state.pos) {
      span.className = "current";
    }
    p.appendChild(span);
  }
}

function showBest() {
  const best = JSON.parse(localStorage.getItem("typingBest") || "null");
  $("best-display").textContent = best
    ? `🏆 Personal best: ${best.wpm} WPM (${best.acc}% accuracy, ${best.difficulty})`
    : "No personal best yet — set one now!";
}

function start() {
  state.difficulty = $("difficulty").value;
  state.passage = buildPassage(state.difficulty);
  state.typed = new Array(state.passage.length).fill(null);
  state.pos = 0; state.errors = 0; state.totalKeys = 0; state.correctKeys = 0;
  state.startTime = null; state.elapsed = 0; state.running = true;
  $("start-screen").classList.add("hide");
  $("result-screen").classList.add("hide");
  $("play-screen").classList.remove("hide");
  $("timer").textContent = state.duration;
  $("timer").classList.remove("timer-pulse");
  $("live-wpm").textContent = "0";
  $("live-acc").textContent = "100%";
  render();
  $("typing-input").value = "";
  $("typing-input").focus();
}

function handleKey(e) {
  if (!state.running) return;
  const key = e.key;
  if (key === "Escape") { e.preventDefault(); restart(); return; }
  if (key.length !== 1 && key !== "Backspace") return;
  e.preventDefault();

  if (!state.startTime && key !== "Backspace") {
    state.startTime = Date.now();
    state.timer = setInterval(tick, 100);
  }

  if (key === "Backspace") {
    if (state.pos > 0) {
      state.pos--;
      state.typed[state.pos] = null;
    }
  } else {
    state.totalKeys++;
    const expected = state.passage[state.pos];
    state.typed[state.pos] = key;
    if (key === expected) {
      state.correctKeys++;
      state.pos++;
    } else {
      state.errors++;
      state.pos++;
    }
    if (state.pos >= state.passage.length) { finish(); return; }
  }
  render();
  updateLive();
}

function updateLive() {
  if (!state.startTime) return;
  const mins = (Date.now() - state.startTime) / 60000;
  const wpm = mins > 0 ? Math.round((state.correctKeys / 5) / mins) : 0;
  const acc = state.totalKeys > 0 ? Math.round((state.correctKeys / state.totalKeys) * 100) : 100;
  $("live-wpm").textContent = wpm;
  $("live-acc").textContent = acc + "%";
}

function tick() {
  const remaining = Math.max(0, state.duration - Math.floor((Date.now() - state.startTime) / 1000));
  $("timer").textContent = remaining;
  if (remaining <= 10) $("timer").classList.add("timer-pulse");
  updateLive();
  if (remaining <= 0) finish();
}

function finish() {
  if (!state.running) return;
  state.running = false;
  clearInterval(state.timer);
  state.elapsed = state.startTime ? (Date.now() - state.startTime) / 1000 : state.duration;
  const mins = state.elapsed / 60;
  const netWpm = mins > 0 ? Math.round((state.correctKeys / 5) / mins) : 0;
  const rawWpm = mins > 0 ? Math.round((state.totalKeys / 5) / mins) : 0;
  const acc = state.totalKeys > 0 ? Math.round((state.correctKeys / state.totalKeys) * 100) : 0;

  $("play-screen").classList.add("hide");
  $("result-screen").classList.remove("hide");
  $("result-wpm").textContent = netWpm;
  $("result-acc").textContent = acc + "%";
  $("result-raw").textContent = rawWpm;
  $("result-errors").textContent = state.errors;
  $("result-chars").textContent = state.totalKeys;

  const best = JSON.parse(localStorage.getItem("typingBest") || "null");
  if (!best || netWpm > best.wpm) {
    localStorage.setItem("typingBest", JSON.stringify({ wpm: netWpm, acc, difficulty: state.difficulty }));
  }

  state.lastResult = { wpm: netWpm, acc, diff: state.difficulty };
}

function restart() {
  state.running = false;
  clearInterval(state.timer);
  $("play-screen").classList.add("hide");
  $("result-screen").classList.add("hide");
  $("start-screen").classList.remove("hide");
  showBest();
}

function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

function copyResult() {
  const r = state.lastResult;
  if (!r) return;
  const url = location.origin + location.pathname + `#score=wpm:${r.wpm},acc:${r.acc},diff:${r.diff}`;
  const text = `I typed ${r.wpm} WPM with ${r.acc}% accuracy on ${r.diff} — beat me at ${url}`;
  navigator.clipboard.writeText(text).then(() => toast("Copied!"));
}

function shareLink() {
  const r = state.lastResult;
  if (!r) return;
  const url = location.origin + location.pathname + `#score=wpm:${r.wpm},acc:${r.acc},diff:${r.diff}`;
  navigator.clipboard.writeText(url).then(() => toast("Link copied!"));
}

function checkChallenge() {
  const hash = location.hash;
  const match = hash.match(/score=wpm:(\d+),acc:(\d+),diff:(\w+)/);
  if (match) {
    const [_, wpm, acc, diff] = match;
    const b = $("challenge-banner");
    b.textContent = `🎯 Challenge: your friend scored ${wpm} WPM (${acc}% on ${diff}) — can you beat them?`;
    b.classList.remove("hide");
  }
}

document.addEventListener("keydown", handleKey);
$("start-btn").addEventListener("click", start);
$("finish-btn").addEventListener("click", finish);
$("restart-btn").addEventListener("click", restart);
$("again-btn").addEventListener("click", restart);
$("copy-btn").addEventListener("click", copyResult);
$("share-link-btn").addEventListener("click", shareLink);
$("passage").addEventListener("click", () => $("typing-input").focus());

showBest();
checkChallenge();
</script>
</body>
</html>
